name: Build Windows App

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: '24'
        cache: 'npm'
        cache-dependency-path: ui/package-lock.json

    - name: Build React UI
      working-directory: ./ui
      run: |
        npm ci
        npm run build

    # Pin exact SDK so the workload installs into the same slot the build uses.
    # global.json is removed so this version is used without conflict.
    - name: Remove global.json
      shell: pwsh
      run: Remove-Item global.json -ErrorAction SilentlyContinue

    - name: Setup .NET 10
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.300'

    - name: Install MAUI Windows Workload
      shell: pwsh
      run: |
        $sdkVer = (dotnet --version)
        Write-Host "Active SDK: $sdkVer"
        dotnet workload install maui-windows --skip-sign-check
        dotnet workload list

    - name: Restore NuGet packages
      run: dotnet restore src/Hiravir/Hiravir.csproj -p:TargetFramework=net10.0-windows10.0.19041.0

    - name: Build MAUI App
      shell: pwsh
      run: |
        # Skip the embedded React build (already done above) and AOT (not needed for portable build)
        dotnet build src/Hiravir/Hiravir.csproj `
          -c Release `
          -f net10.0-windows10.0.19041.0 `
          -r win-x64 `
          --no-restore `
          -p:WindowsPackageType=None `
          -p:SelfContained=true `
          -p:PublishAot=false `
          -p:PublishReadyToRun=false `
          -p:AppxPackageSigningEnabled=false `
          -p:SkipReactBuild=true
        if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

    - name: Collect output
      shell: pwsh
      run: |
        $exes = Get-ChildItem -Recurse src/Hiravir/bin -Filter "Hiravir.exe" -ErrorAction SilentlyContinue
        if ($exes.Count -eq 0) {
          Write-Host "No Hiravir.exe found. Full bin listing:"
          Get-ChildItem -Recurse src/Hiravir/bin -ErrorAction SilentlyContinue | Select-Object FullName
          exit 1
        }
        $outDir = $exes[0].DirectoryName
        Write-Host "Packaging from: $outDir"
        New-Item -ItemType Directory -Force -Path publish/hiravir-win | Out-Null
        Copy-Item "$outDir\*" publish/hiravir-win/ -Recurse -Force

    - name: Upload Finished App
      uses: actions/upload-artifact@v4
      with:
        name: Hiravir-Portable-App
        path: publish/hiravir-win/
