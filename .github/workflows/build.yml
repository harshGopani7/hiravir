name: Build Windows App

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    # ── Prep ──────────────────────────────────────────────────────────────────
    # Remove global.json — let the system dotnet pick its own SDK version
    - name: Remove global.json
      shell: pwsh
      run: Remove-Item global.json -ErrorAction SilentlyContinue

    # ── Node / React ──────────────────────────────────────────────────────────
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: '24'
        cache: 'npm'
        cache-dependency-path: ui/package-lock.json

    - name: Build React UI
      working-directory: ./ui
      run: |
        npm ci
        npm run build

    # ── MAUI Workload ─────────────────────────────────────────────────────────
    # Do NOT use setup-dotnet — it puts dotnet in a different path than where
    # workloads install, breaking SDK resolution. Use the system dotnet on the
    # runner (already has .NET 8/9/10 preview). Install maui-windows into it.
    - name: Show system dotnet info
      shell: pwsh
      run: |
        Write-Host "dotnet path: $((Get-Command dotnet).Source)"
        dotnet --list-sdks

    - name: Install MAUI Windows Workload
      shell: pwsh
      run: |
        dotnet workload install maui-windows --skip-sign-check
        dotnet workload list

    # ── Build ─────────────────────────────────────────────────────────────────
    - name: Build MAUI App
      shell: pwsh
      run: |
        dotnet build src/Hiravir/Hiravir.csproj `
          -c Release `
          -f net10.0-windows10.0.19041.0 `
          -r win-x64 `
          -p:WindowsPackageType=None `
          -p:SelfContained=true `
          -p:PublishAot=false `
          -p:PublishReadyToRun=false `
          -p:AppxPackageSigningEnabled=false `
          -p:SkipReactBuild=true `
          -p:EnableWindowsTargeting=true
        if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

    # ── Package ───────────────────────────────────────────────────────────────
    - name: Collect output
      shell: pwsh
      run: |
        $exes = Get-ChildItem -Recurse src/Hiravir/bin -Filter "Hiravir.exe" -ErrorAction SilentlyContinue
        if ($exes.Count -eq 0) {
          Write-Host "Hiravir.exe not found — full bin listing:"
          Get-ChildItem -Recurse src/Hiravir/bin -ErrorAction SilentlyContinue | Select-Object FullName
          exit 1
        }
        $outDir = $exes[0].DirectoryName
        Write-Host "Packaging from: $outDir"
        New-Item -ItemType Directory -Force -Path publish/hiravir-win | Out-Null
        Copy-Item "$outDir\*" publish/hiravir-win/ -Recurse -Force

    - name: Upload Finished App
      uses: actions/upload-artifact@v4
      with:
        name: Hiravir-Portable-App
        path: publish/hiravir-win/
