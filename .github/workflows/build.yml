name: Build Windows App

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    # Remove global.json so the runner uses whatever .NET 10 SDK it has,
    # with no version-pin conflicts.
    - name: Remove global.json (avoid SDK version mismatch on CI)
      shell: pwsh
      run: Remove-Item global.json -ErrorAction SilentlyContinue

    - name: Setup .NET 10
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Install MAUI Windows Workload
      run: dotnet workload install maui-windows --skip-sign-check

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: '24'
        cache: 'npm'
        cache-dependency-path: ui/package-lock.json

    - name: Build React UI
      working-directory: ./ui
      run: |
        npm ci
        npm run build

    - name: Build MAUI App (unpackaged, self-contained)
      shell: pwsh
      run: |
        dotnet build src/Hiravir/Hiravir.csproj `
          -c Release `
          -f net10.0-windows10.0.19041.0 `
          -r win-x64 `
          -p:WindowsPackageType=None `
          -p:SelfContained=true `
          -p:PublishAot=false `
          -p:PublishReadyToRun=true `
          -p:AppxPackageSigningEnabled=false
        if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

    - name: Locate and collect output
      shell: pwsh
      run: |
        # Find the built exe and copy everything to a clean publish folder
        $exes = Get-ChildItem -Recurse src/Hiravir/bin -Filter "Hiravir.exe" -ErrorAction SilentlyContinue
        Write-Host "Found executables:"
        $exes | ForEach-Object { Write-Host $_.FullName }
        if ($exes.Count -eq 0) {
          Write-Host "No exe found. Listing bin folder:"
          Get-ChildItem -Recurse src/Hiravir/bin -ErrorAction SilentlyContinue | Select-Object FullName
          exit 1
        }
        $outDir = $exes[0].DirectoryName
        Write-Host "Output dir: $outDir"
        New-Item -ItemType Directory -Force -Path publish/hiravir-win | Out-Null
        Copy-Item "$outDir\*" publish/hiravir-win/ -Recurse -Force

    - name: Upload Finished App
      uses: actions/upload-artifact@v4
      with:
        name: Hiravir-Portable-App
        path: publish/hiravir-win/
