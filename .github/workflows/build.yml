name: Build Windows App

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup .NET 10
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Install MAUI Windows Workload
      run: |
        dotnet workload install maui-windows --skip-sign-check
        dotnet workload restore src/Hiravir/Hiravir.csproj

    - name: Verify SDK and workloads
      run: |
        dotnet --version
        dotnet --list-sdks
        dotnet workload list

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: '24'
        cache: 'npm'
        cache-dependency-path: ui/package-lock.json

    - name: Build React UI
      working-directory: ./ui
      run: |
        npm ci
        npm run build

    - name: Build & Publish MAUI App (unpackaged, self-contained)
      shell: pwsh
      run: |
        # Use `dotnet msbuild` so the .NET 10 SDK toolchain is used (not VS MSBuild 17).
        dotnet msbuild src/Hiravir/Hiravir.csproj `
          /t:Build `
          /p:Configuration=Release `
          /p:TargetFramework=net10.0-windows10.0.19041.0 `
          /p:RuntimeIdentifier=win-x64 `
          /p:WindowsPackageType=None `
          /p:SelfContained=true `
          /p:PublishAot=false `
          /p:PublishReadyToRun=true `
          "/p:OutputPath=${{ github.workspace }}/publish/hiravir-win/" `
          /v:minimal
        if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

    - name: List output (debug)
      shell: pwsh
      run: Get-ChildItem -Recurse publish\ -ErrorAction SilentlyContinue | Select-Object FullName | Select-Object -First 30

    - name: Upload Finished App
      uses: actions/upload-artifact@v4
      with:
        name: Hiravir-Portable-App
        path: publish/hiravir-win/
